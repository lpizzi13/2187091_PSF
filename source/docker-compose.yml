services:
  # 1. Simulatore fornito (da caricare con docker load)
  simulator:
    image: seismic-signal-simulator:multiarch_v1
    container_name: seismic-simulator
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SAMPLING_RATE_HZ=20.0
      - AUTO_SHUTDOWN_ENABLED=true
      - AUTO_SHUTDOWN_MIN_SECONDS=30.0
      - AUTO_SHUTDOWN_MAX_SECONDS=90.0
    networks:
      - seismic-net

  # 2. Database condiviso (MySQL)
  db:
    image: mysql:8.0
    container_name: seismic-db
    restart: always
    environment:
      - MYSQL_DATABASE=seismic_db
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=secret
      - MYSQL_ROOT_PASSWORD=root_secret
    ports:
      - "3307:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - seismic-net

  # 3. Custom Broker (Regione Neutrale)
  broker:
    build: ./broker
    container_name: seismic-broker
    restart: unless-stopped
    depends_on:
      simulator:
        condition: service_started
    environment:
      - SIMULATOR_URL=http://simulator:8080
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    networks:
      - seismic-net

  # 4. Processing Service (Active + Backup)
  replica-primary:
    build: ./processing-replica
    container_name: processing-replica-primary
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
      simulator:
        condition: service_started
    environment:
      - REPLICA_ID=replica-primary
      - PRIMARY_REPLICA_ID=replica-primary
      - PRIMARY_REPLICA_HEALTH_URL=http://replica-primary:8000/health
      - REPLICA_IDS=replica-primary,replica-backup-1,replica-backup-2
      - DB_WRITER_LOCK_NAME=seismic_single_writer_lock
      - DB_URL=mysql://admin:secret@db:3306/seismic_db
      - SIMULATOR_API_URL=http://simulator:8080
      - SIMULATOR_CONTROL_URL=http://simulator:8080/api/control
      - BROKER_URL=ws://broker:8000/data
      - SAMPLING_RATE_HZ=20.0
      - WINDOW_SIZE=128
      - HOP_SIZE=64
      - MIN_EVENT_GAP_SECONDS=8.0
      - PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    networks:
      - seismic-net

  replica-backup-1:
    build: ./processing-replica
    container_name: processing-replica-backup-1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
      simulator:
        condition: service_started
    environment:
      - REPLICA_ID=replica-backup-1
      - PRIMARY_REPLICA_ID=replica-primary
      - PRIMARY_REPLICA_HEALTH_URL=http://replica-primary:8000/health
      - REPLICA_IDS=replica-primary,replica-backup-1,replica-backup-2
      - DB_WRITER_LOCK_NAME=seismic_single_writer_lock
      - DB_URL=mysql://admin:secret@db:3306/seismic_db
      - SIMULATOR_API_URL=http://simulator:8080
      - SIMULATOR_CONTROL_URL=http://simulator:8080/api/control
      - BROKER_URL=ws://broker:8000/data
      - SAMPLING_RATE_HZ=20.0
      - WINDOW_SIZE=128
      - HOP_SIZE=64
      - MIN_EVENT_GAP_SECONDS=8.0
      - PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    networks:
      - seismic-net

  replica-backup-2:
    build: ./processing-replica
    container_name: processing-replica-backup-2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
      simulator:
        condition: service_started
    environment:
      - REPLICA_ID=replica-backup-2
      - PRIMARY_REPLICA_ID=replica-primary
      - PRIMARY_REPLICA_HEALTH_URL=http://replica-primary:8000/health
      - REPLICA_IDS=replica-primary,replica-backup-1,replica-backup-2
      - DB_WRITER_LOCK_NAME=seismic_single_writer_lock
      - DB_URL=mysql://admin:secret@db:3306/seismic_db
      - SIMULATOR_API_URL=http://simulator:8080
      - SIMULATOR_CONTROL_URL=http://simulator:8080/api/control
      - BROKER_URL=ws://broker:8000/data
      - SAMPLING_RATE_HZ=20.0
      - WINDOW_SIZE=128
      - HOP_SIZE=64
      - MIN_EVENT_GAP_SECONDS=8.0
      - PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    networks:
      - seismic-net

  # 5. API Gateway (Regione Neutrale)
  gateway:
    build: ./gateway
    container_name: seismic-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      replica-primary:
        condition: service_started
      replica-backup-1:
        condition: service_started
      replica-backup-2:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/gateway/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    networks:
      - seismic-net

  # 6. Frontend Dashboard
  dashboard:
    build: ./dashboard
    container_name: seismic-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    networks:
      - seismic-net

networks:
  seismic-net:
    driver: bridge
