user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Docker DNS resolver for dynamic service discovery
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 2s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    upstream processing_replicas {
        least_conn;
        zone processing_replicas 64k;

        # Active/backup mode:
        # - all traffic goes to replica-primary when healthy
        # - backups are used only if primary is unavailable
        server replica-primary:8000 max_fails=2 fail_timeout=10s;
        server replica-backup-1:8000 backup max_fails=2 fail_timeout=10s;
        server replica-backup-2:8000 backup max_fails=2 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        location = /gateway/health {
            default_type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        # WebSocket/SSE and other streaming paths
        location ~* /(ws|stream)(/|$) {
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_pass http://processing_replicas;
        }

        location / {
            proxy_buffering on;
            proxy_pass http://processing_replicas;
        }

        error_page 502 503 504 = /_gateway_unavailable.json;

        location = /_gateway_unavailable.json {
            internal;
            default_type application/json;
            return 503 '{"error":"processing_replicas_unavailable"}';
        }
    }
}
